name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci && npm run build
      - run: npm ci && npm run build
        working-directory: functions
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PERMACULTURA_LOS_ANDES }}
          channelId: live
          projectId: permacultura-los-andes
      - name: Deploy functions + firestore rules
        uses: w9jds/firebase-action@v14.10.1
        with:
          args: deploy --only functions,firestore --project permacultura-los-andes
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PERMACULTURA_LOS_ANDES }}
