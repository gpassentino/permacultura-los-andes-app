@if (user()) {
  <!-- ── Desktop top navbar ── -->
  <nav class="navbar navbar-expand-md px-3 d-none d-md-flex align-items-center"
       style="background-color: #f5ebe0; border-bottom: 1px solid #d4c5b0; min-height: 56px;">
    <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2 text-decoration-none"
       routerLink="/tablero">
      🌿 Permacultura Los Andes
    </a>
    <ul class="navbar-nav me-auto ms-3 d-flex flex-row gap-1">
      <li class="nav-item">
        <a class="nav-link px-2"
           routerLink="/tablero"
           routerLinkActive="fw-semibold text-primary">
          Tablero
        </a>
      </li>
    </ul>
    <div class="d-flex align-items-center gap-3">
      <span class="text-muted small">{{ user()?.email }}</span>
      <button class="btn btn-outline-secondary btn-sm"
              (click)="authService.cerrarSesion()">
        Cerrar sesión
      </button>
    </div>
  </nav>
}

<!-- ── Main content ── -->
<main [class.main-with-bottom-nav]="user()">
  <router-outlet />
</main>

@if (user()) {
  <!-- ── Mobile bottom nav ── -->
  <nav class="bottom-nav d-flex d-md-none justify-content-around align-items-center">
    <a routerLink="/tablero"
       routerLinkActive="active"
       class="bottom-nav-item d-flex flex-column align-items-center text-decoration-none gap-1 py-2">
      <span style="font-size: 1.3rem;">🌿</span>
      <small>Tablero</small>
    </a>
    <button class="bottom-nav-item btn btn-link d-flex flex-column align-items-center gap-1 py-2 text-decoration-none"
            (click)="authService.cerrarSesion()">
      <span style="font-size: 1.3rem;">🚪</span>
      <small>Salir</small>
    </button>
  </nav>
}
