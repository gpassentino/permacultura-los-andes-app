@if (user()) {
  <!-- ── Desktop top navbar ── -->
  <nav class="navbar navbar-expand-md px-3 d-none d-md-flex align-items-center top-navbar">
    <a class="navbar-brand d-flex align-items-center text-decoration-none"
       routerLink="/tablero"
       aria-label="Permacultura Los Andes">
      <img src="/assets/logo/permacultura-los-andes.png"
           alt="Permacultura Los Andes"
           class="navbar-logo">
    </a>
    <ul class="navbar-nav me-auto ms-3 d-flex flex-row gap-1">
      <li class="nav-item">
        <a class="nav-link px-2"
           routerLink="/tablero"
           routerLinkActive="fw-semibold text-primary">
          Tablero
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link px-2"
           routerLink="/academia"
           routerLinkActive="fw-semibold text-primary">
          Academia
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link px-2"
           routerLink="/contactos"
           routerLinkActive="fw-semibold text-primary">
          Contactos
        </a>
      </li>
    </ul>
    <div class="d-flex align-items-center gap-3">
      <span class="text-muted small">{{ user()?.email }}</span>
      <button class="btn btn-outline-secondary btn-sm"
              (click)="authService.cerrarSesion()">
        Cerrar sesión
      </button>
    </div>
  </nav>
}

<!-- ── Main content ── -->
<main [class.main-with-bottom-nav]="user()">
  <router-outlet />
</main>

@if (user()) {
  <!-- ── Mobile bottom nav ── -->
  <nav class="bottom-nav d-flex d-md-none justify-content-around align-items-center">
    <a routerLink="/tablero"
       routerLinkActive="active"
       class="bottom-nav-item d-flex flex-column align-items-center text-decoration-none gap-1 py-2">
      <span class="nav-icon">🌿</span>
      <small>Tablero</small>
    </a>
    <a routerLink="/academia"
       routerLinkActive="active"
       class="bottom-nav-item d-flex flex-column align-items-center text-decoration-none gap-1 py-2">
      <span class="nav-icon">🎓</span>
      <small>Academia</small>
    </a>
    <a routerLink="/contactos"
       routerLinkActive="active"
       class="bottom-nav-item d-flex flex-column align-items-center text-decoration-none gap-1 py-2">
      <span class="nav-icon">📱</span>
      <small>Contactos</small>
    </a>
    <button class="bottom-nav-item btn btn-link d-flex flex-column align-items-center gap-1 py-2 text-decoration-none"
            (click)="authService.cerrarSesion()">
      <span class="nav-icon">🚪</span>
      <small>Salir</small>
    </button>
  </nav>
}
