<div class="login-page d-flex align-items-center justify-content-center min-vh-100">
  <div class="login-card card shadow p-4 p-md-5 mx-3">

    <!-- Logo / Brand -->
    <div class="text-center mb-4">
      <img src="/assets/logo/permacultura-los-andes.png"
           alt="Permacultura Los Andes"
           class="login-logo mb-2">
      <p class="text-muted small mb-0">El Retiro, Antioquia, Colombia</p>
    </div>

    <!-- Error alert -->
    @if (error()) {
      <div class="alert alert-danger text-center small py-2 mb-3" role="alert">
        {{ error() }}
      </div>
    }

    <!-- Google Sign-In button -->
    <button
      class="btn btn-google w-100 d-flex align-items-center justify-content-center gap-2"
      (click)="signIn()"
      [disabled]="loading()"
    >
      @if (loading()) {
        <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
        <span>Iniciando sesión...</span>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6,20.1H42V20H24v8h11.3C33.7,32.7,29.2,36,24,36c-6.6,0-12-5.4-12-12s5.4-12,12-12c3.1,0,5.8,1.2,8,3l5.7-5.7C34,6.1,29.3,4,24,4C13,4,4,13,4,24s9,20,20,20s20-9,20-20C44,22.7,43.9,21.4,43.6,20.1z"/>
          <path fill="#FF3D00" d="M6.3,14.7l6.6,4.8C14.7,15.1,19.1,12,24,12c3.1,0,5.8,1.2,8,3l5.7-5.7C34,6.1,29.3,4,24,4C16.3,4,9.7,8.3,6.3,14.7z"/>
          <path fill="#4CAF50" d="M24,44c5.2,0,9.9-2,13.4-5.2l-6.2-5.2C29.2,35.1,26.7,36,24,36c-5.2,0-9.6-3.3-11.3-7.9l-6.5,5C9.5,39.6,16.2,44,24,44z"/>
          <path fill="#1976D2" d="M43.6,20.1H42V20H24v8h11.3c-0.8,2.2-2.2,4.2-4.1,5.6l6.2,5.2C36.9,39.2,44,34,44,24C44,22.7,43.9,21.4,43.6,20.1z"/>
        </svg>
        <span>Ingresar con Google</span>
      }
    </button>

    <p class="text-center text-muted mt-4 mb-0 fs-tiny">
      Acceso restringido — solo usuarios autorizados
    </p>
  </div>
</div>
